upstream vision_api {
    server vision-api:8001;
}

upstream catalog_api {
    server catalog-api:8002;
}

server {
    listen 80;
    server_name localhost;

    # ── Node Alpha — Vision API ───────────────────────────────────────────────
    location /api/vision/ {
        rewrite ^/api/vision(/.*)$ $1 break;
        proxy_pass http://vision_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 15M;
    }

    # ── Vision static files (cropped artwork) ─────────────────────────────────
    location /api/vision/static/ {
        rewrite ^/api/vision(/static/.*)$ $1 break;
        proxy_pass http://vision_api;
    }

    # ── Node Beta — Catalog API ───────────────────────────────────────────────
    location /api/catalog/ {
        rewrite ^/api/catalog(/.*)$ $1 break;
        proxy_pass http://catalog_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Next.js dev server (when running outside Docker) ─────────────────────
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
